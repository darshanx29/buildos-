<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BuildOS | Projects</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config={darkMode:"class",theme:{extend:{colors:{"error-container":"#ffdad6","primary-fixed":"#d7e2ff","on-primary-fixed-variant":"#3c475d","surface-container-highest":"#d1e4ff","surface-container-lowest":"#ffffff","on-secondary-container":"#48617e","on-primary-fixed":"#101b30","error":"#ba1a1a","primary":"#000000","surface-container-high":"#dbe9ff","outline-variant":"#c4c6cc","tertiary":"#000000","primary-container":"#101b30","on-surface-variant":"#44474c","on-tertiary-fixed":"#2f1400","on-error":"#ffffff","tertiary-fixed":"#ffdcc4","secondary-container":"#c2dcff","inverse-surface":"#1b324a","on-secondary-fixed":"#001d36","tertiary-fixed-dim":"#ffb780","on-secondary":"#ffffff","surface":"#f8f9ff","on-tertiary-container":"#bb7336","on-tertiary":"#ffffff","secondary-fixed":"#d1e4ff","on-background":"#031d34","on-error-container":"#93000a","surface-tint":"#545e76","surface-variant":"#d1e4ff","outline":"#74777d","on-primary-container":"#79849d","surface-dim":"#c5dcfb","surface-container-low":"#eef4ff","secondary":"#47607e","on-tertiary-fixed-variant":"#6f3800","inverse-primary":"#bbc6e2","on-surface":"#031d34","background":"#f8f9ff","surface-container":"#e5efff","on-primary":"#ffffff","surface-bright":"#f8f9ff","inverse-on-surface":"#e9f1ff"},borderRadius:{DEFAULT:"0.125rem",lg:"0.25rem",xl:"0.5rem",full:"0.75rem"},fontFamily:{headline:["Manrope"],body:["Inter"],label:["Inter"]}}}}
</script>
<style>
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;display:inline-block;line-height:1;text-transform:none;letter-spacing:normal;word-wrap:normal;white-space:nowrap;}
  body{font-family:'Inter',sans-serif;background-color:#f8f9ff;}
  .sidebar-active{background-color:#eef4ff;color:#000000;}
</style>
</head>
<body class="text-on-background">
<div class="flex min-h-screen">
  <aside class="w-64 bg-surface border-r border-outline-variant/20 flex flex-col fixed h-full z-50">
    <div class="p-6 flex items-center gap-3">
      <div class="size-10 bg-primary flex items-center justify-center rounded-lg">
        <svg class="text-white size-6" fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path d="M44 4H30.6666V17.3334H17.3334V30.6666H4V44H44V4Z" fill="currentColor"/></svg>
      </div>
      <div><h1 class="font-headline font-bold text-lg leading-none">BuildOS</h1><p class="text-on-surface-variant text-xs mt-1">Construction Management</p></div>
    </div>
    <nav class="flex-1 px-4 mt-4 flex flex-col gap-1">
      <a href="/dashboard" class="text-on-surface-variant hover:bg-surface-container-low flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium text-sm"><span class="material-symbols-outlined">dashboard</span>Dashboard</a>
      <a href="/inventory" class="text-on-surface-variant hover:bg-surface-container-low flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium text-sm"><span class="material-symbols-outlined">inventory_2</span>Inventory</a>
      <a href="/finance" class="text-on-surface-variant hover:bg-surface-container-low flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium text-sm"><span class="material-symbols-outlined">payments</span>Finance</a>
      <a href="/invoices" class="text-on-surface-variant hover:bg-surface-container-low flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium text-sm"><span class="material-symbols-outlined">receipt_long</span>Invoices</a>
      <a href="/projects" class="sidebar-active flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium text-sm"><span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">architecture</span>Projects</a>
    </nav>
    <div class="p-4 mt-auto border-t border-outline-variant/10">
      <div class="flex items-center gap-3 p-2 rounded-xl bg-surface-container-low">
        <div class="size-10 rounded-full bg-secondary flex items-center justify-center text-white font-bold text-sm">SM</div>
        <div class="overflow-hidden"><p class="text-sm font-bold truncate">Site Manager</p><p class="text-xs text-on-surface-variant truncate">Director of Operations</p></div>
      </div>
    </div>
  </aside>
  <main class="flex-1 ml-64">
    <header class="h-20 bg-surface/80 backdrop-blur-md border-b border-outline-variant/10 flex items-center justify-between px-10 sticky top-0 z-40">
      <h2 class="font-headline text-xl font-bold">All Projects</h2>
      <button onclick="document.getElementById('add-modal').classList.remove('hidden')"
              class="flex items-center gap-2 bg-primary text-white text-xs font-bold px-4 py-2 rounded-xl hover:opacity-90">
        <span class="material-symbols-outlined text-sm">add</span> New Project
      </button>
    </header>
    <div class="p-10 max-w-[1600px] mx-auto">
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6" id="projects-grid">
        <p class="col-span-3 text-center text-on-surface-variant py-20 text-sm">Loading projects...</p>
      </div>
    </div>
  </main>
</div>

<div id="add-modal" class="hidden fixed inset-0 bg-black/40 z-[100] flex items-center justify-center">
  <div class="bg-surface-container-lowest rounded-full p-8 w-full max-w-md shadow-2xl space-y-4">
    <h3 class="font-headline text-xl font-bold">New Project</h3>
    <input id="new-name" class="w-full bg-surface-container-low border-none rounded-xl py-3 px-4 text-sm" placeholder="Project Name"/>
    <input id="new-location" class="w-full bg-surface-container-low border-none rounded-xl py-3 px-4 text-sm" placeholder="Site Location"/>
    <input id="new-budget" type="number" class="w-full bg-surface-container-low border-none rounded-xl py-3 px-4 text-sm" placeholder="Budget (₹)"/>
    <div class="flex gap-3">
      <button onclick="createProject()" class="flex-1 bg-primary text-white font-bold py-3 rounded-xl text-sm">Create</button>
      <button onclick="document.getElementById('add-modal').classList.add('hidden')" class="flex-1 bg-surface-container-low text-on-surface-variant font-bold py-3 rounded-xl text-sm">Cancel</button>
    </div>
  </div>
</div>

<script>
  let pid=localStorage.getItem('currentProjectId');

  async function loadProjects(){
    const res=await fetch('/api/projects/');const projs=await res.json();
    const grid=document.getElementById('projects-grid');
    if(!projs.length){grid.innerHTML='<p class="col-span-3 text-center text-on-surface-variant py-20 text-sm">No projects yet. Create one!</p>';return;}
    grid.innerHTML=projs.map(p=>`
      <div class="bg-surface-container-lowest p-7 rounded-full border border-outline-variant/5 shadow-sm hover:shadow-md group">
        <div class="flex justify-between items-start mb-3">
          <h4 class="font-headline font-bold text-xl group-hover:text-secondary transition-colors">${p.name}</h4>
          ${p.id===pid?'<span class="bg-secondary-container text-secondary text-[10px] font-bold px-2 py-0.5 rounded uppercase">Active</span>':''}
        </div>
        <div class="space-y-1 mb-4">
          <p class="text-sm text-on-surface-variant flex items-center gap-2"><span class="material-symbols-outlined text-sm">location_on</span>${p.site_location||'Location TBD'}</p>
          <p class="text-sm text-on-surface-variant flex items-center gap-2"><span class="material-symbols-outlined text-sm">payments</span>₹${Number(p.budget).toLocaleString('en-IN')}</p>
          <p class="text-xs text-on-surface-variant">Created: ${new Date(p.created_at).toLocaleDateString('en-IN')}</p>
        </div>
        <div class="flex gap-2 pt-4 border-t border-outline-variant/10">
          <button onclick="setActive('${p.id}')" class="flex-1 bg-secondary text-white text-xs font-bold py-2 rounded-xl hover:opacity-90">Set Active</button>
          <button onclick="deleteProject('${p.id}')" class="px-4 bg-error-container text-error text-xs font-bold py-2 rounded-xl hover:opacity-90">Delete</button>
        </div>
      </div>`).join('') + `
      <button onclick="document.getElementById('add-modal').classList.remove('hidden')"
              class="bg-surface border-2 border-dashed border-outline-variant/30 p-7 rounded-full flex flex-col items-center justify-center gap-2 hover:bg-surface-container-low hover:border-outline transition-all min-h-[200px]">
        <span class="material-symbols-outlined text-4xl text-on-surface-variant">add_circle</span>
        <span class="font-bold text-sm text-on-surface-variant uppercase tracking-widest">Add New Project</span>
      </button>`;
  }

  function setActive(id){localStorage.setItem('currentProjectId',id);pid=id;loadProjects();}

  async function createProject(){
    const name=document.getElementById('new-name').value.trim();
    const loc=document.getElementById('new-location').value.trim();
    const budget=document.getElementById('new-budget').value;
    if(!name||!budget)return alert('Name and budget required.');
    await fetch('/api/projects/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,site_location:loc,budget:parseFloat(budget)})});
    document.getElementById('add-modal').classList.add('hidden');
    await loadProjects();
  }

  async function deleteProject(id){
    if(!confirm('Delete this project and all its data?'))return;
    await fetch(`/api/projects/${id}`,{method:'DELETE'});
    if(pid===id){localStorage.removeItem('currentProjectId');pid=null;}
    await loadProjects();
  }

  loadProjects().catch(console.error);
</script>
</body>
</html>
