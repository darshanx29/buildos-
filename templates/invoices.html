<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Samarth Devlopers | Invoice Generation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#6366f1",
          "background-stone": "#f1f0ee",
          "outline-muted": "#dcdad5",
          "secondary": "#fd6c00"
        },
        fontFamily: {
          sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          ui: ['"Outfit"', 'sans-serif'],
        }
      }
    }
  }
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; line-height: 1; }
    
    body { 
        font-family: 'Outfit', sans-serif;
        background-image: url('https://images.unsplash.com/photo-1541888946425-d81bb19480c5?auto=format&fit=crop&q=80&w=2070'); 
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
    }

    .bg-overlay {
        background: rgba(241, 240, 230, 0.9);
        position: fixed;
        inset: 0;
        z-index: -10;
    }

    .glass-card {
        background: rgba(255, 255, 255, 0.7) !important;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 1.25rem;
    }

    .nav-glass {
        background: rgba(255, 255, 255, 0.6) !important;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
    }

    /* Modal animation */
    #add-material-modal {
        transition: opacity 0.2s ease, transform 0.2s ease;
    }
    #add-material-modal.hidden {
        opacity: 0;
        pointer-events: none;
    }
    #modal-box {
        transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s ease;
    }
    #add-material-modal.hidden #modal-box {
        transform: scale(0.92) translateY(12px);
        opacity: 0;
    }
</style>
</head>
<body class="antialiased">

<div class="bg-overlay"></div>

<!-- =====================  ADD MATERIAL MODAL  ===================== -->
<div id="add-material-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden"
     style="background: rgba(15,15,30,0.45); backdrop-filter: blur(4px);">
  <div id="modal-box" class="glass-card w-full max-w-md mx-4 p-8 shadow-2xl">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h3 class="text-xl font-extrabold tracking-tight text-slate-900 font-sans uppercase">Add New Material</h3>
        <p class="text-[10px] font-black tracking-widest text-slate-400 uppercase mt-0.5">Register to inventory</p>
      </div>
      <button onclick="closeAddMaterialModal()"
              class="p-2 rounded-full hover:bg-slate-100 text-slate-400 hover:text-slate-700 transition-colors">
        <span class="material-symbols-outlined text-[22px]">close</span>
      </button>
    </div>

    <div class="space-y-5">
      <div class="space-y-1.5">
        <label class="text-[10px] font-black tracking-widest uppercase text-slate-500">Material Name</label>
        <input id="new-mat-name" type="text" placeholder="e.g. Ambuja Cement"
               class="w-full bg-white/60 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-primary/25 transition-all outline-none"/>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1.5">
          <label class="text-[10px] font-black tracking-widest uppercase text-slate-500">Unit</label>
          <select id="new-mat-unit"
                  class="w-full bg-white/60 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-primary/25 transition-all outline-none">
            <option value="bag">Bag</option>
            <option value="kg">kg</option>
            <option value="ton">Ton</option>
            <option value="litre">Litre</option>
            <option value="sqft">Sq.ft</option>
            <option value="unit">Unit</option>
            <option value="rft">Rft</option>
            <option value="cft">Cft</option>
          </select>
        </div>
        <div class="space-y-1.5">
          <label class="text-[10px] font-black tracking-widest uppercase text-slate-500">Unit Price (₹)</label>
          <input id="new-mat-price" type="number" placeholder="0"
                 class="w-full bg-white/60 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-primary/25 transition-all outline-none"/>
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="text-[10px] font-black tracking-widest uppercase text-slate-500">Category <span class="text-slate-300">(optional)</span></label>
        <input id="new-mat-category" type="text" placeholder="e.g. Cement, Steel, Plumbing..."
               class="w-full bg-white/60 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-primary/25 transition-all outline-none"/>
      </div>

      <p id="modal-msg" class="text-xs font-bold hidden text-center"></p>

      <div class="flex gap-3 pt-1">
        <button onclick="closeAddMaterialModal()"
                class="flex-1 py-3 border border-slate-200 text-slate-600 rounded-xl font-bold text-xs tracking-widest uppercase hover:bg-slate-50 transition-all">
          Cancel
        </button>
        <button onclick="saveNewMaterial()"
                class="flex-1 py-3 bg-primary text-white rounded-xl font-bold text-xs tracking-widest uppercase hover:bg-indigo-600 transition-all active:scale-[0.98] shadow-lg shadow-primary/25">
          <span class="material-symbols-outlined text-[16px] align-middle mr-1">add_circle</span>
          Add Material
        </button>
      </div>
    </div>
  </div>
</div>
<!-- ================================================================ -->

<header class="fixed top-0 w-full z-50 nav-glass border-b border-outline-muted/50">
  <div class="max-w-7xl mx-auto px-8 h-16 flex items-center justify-between">
    <div class="flex items-center gap-10">
      <span class="text-xl font-extrabold tracking-tight text-slate-800 font-sans">CONSTRUCT<span class="text-primary">OS</span></span>
      <nav class="hidden md:flex items-center gap-2">
        <a href="/dashboard" class="flex items-center gap-2 px-4 py-2 text-slate-600 hover:text-primary font-semibold text-sm transition-all">
          <span class="material-symbols-outlined text-[20px]">dashboard</span> Dashboard
        </a>
        <a href="/inventory" class="flex items-center gap-2 px-4 py-2 text-slate-600 hover:text-primary font-semibold text-sm transition-all">
          <span class="material-symbols-outlined text-[20px]">inventory_2</span> Inventory
        </a>
        <a href="/finance" class="flex items-center gap-2 px-4 py-2 text-slate-600 hover:text-primary font-semibold text-sm transition-all">
          <span class="material-symbols-outlined text-[20px]">payments</span> Finance
        </a>
        <a href="/invoices" class="flex items-center gap-2 px-4 py-2 bg-white/60 text-primary rounded-xl font-bold text-sm shadow-sm border border-white/40">
          <span class="material-symbols-outlined text-[20px]">receipt_long</span> Invoices
        </a>
      </nav>
    </div>

    <div class="flex items-center gap-6">
      <span class="text-xs font-bold text-slate-500 uppercase tracking-widest font-sans" id="header-project">Loading...</span>
      <select id="project-selector" onchange="switchProject(this.value)" 
              class="text-xs bg-transparent border-none font-bold text-slate-700 focus:ring-0 cursor-pointer">
      </select>
      <button onclick="location.reload()" class="p-2 rounded-full hover:bg-white/40 text-slate-500 transition-colors">
        <span class="material-symbols-outlined">refresh</span>
      </button>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto pt-28 px-8 pb-20">
  <div class="grid grid-cols-12 gap-10 items-start">

    <div class="col-span-12 lg:col-span-5 glass-card p-10 shadow-sm">
      <div class="mb-8">
        <h2 class="text-3xl font-extrabold tracking-tighter text-slate-900 font-sans uppercase mb-1">Invoice Generation</h2>
        <p class="text-[10px] font-black tracking-widest text-slate-400 uppercase">Create new fiscal record</p>
      </div>
      <div class="space-y-6">
        <div class="space-y-2">
          <label class="text-[10px] font-black tracking-widest uppercase text-slate-500">Select Material</label>

          <!-- Custom material selector wrapper -->
          <div class="relative">
            <select id="inv-material"
                    class="w-full bg-white/50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-primary/20 transition-all appearance-none pr-10"
                    onchange="handleMaterialChange(this)">
              <option value="">-- Select Material --</option>
              <!-- materials injected here -->
              <option value="__add_new__" class="font-bold text-primary">➕  Add New Material...</option>
            </select>
            <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-[18px]">expand_more</span>
          </div>

          <!-- Quick-add button shortcut below dropdown -->
          <button onclick="openAddMaterialModal()"
                  class="flex items-center gap-1.5 text-[10px] font-black tracking-widest uppercase text-primary hover:text-indigo-700 transition-colors mt-1">
            <span class="material-symbols-outlined text-[14px]">add_circle</span>
            Add New Material
          </button>
        </div>

        <div class="space-y-2">
          <label class="text-[10px] font-black tracking-widest uppercase text-slate-500">Description</label>
          <input id="inv-desc" class="w-full bg-white/50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-primary/20 transition-all" type="text" placeholder="Supply of material"/>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div class="space-y-2">
            <label class="text-[10px] font-black tracking-widest uppercase text-slate-500">Quantity</label>
            <input id="inv-qty" type="number" oninput="updateTotal()" class="w-full bg-white/50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-primary/20 transition-all" placeholder="0"/>
          </div>
          <div class="space-y-2">
            <label class="text-[10px] font-black tracking-widest uppercase text-slate-500">Unit Price (₹)</label>
            <input id="inv-price" type="number" oninput="updateTotal()" class="w-full bg-white/50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-primary/20 transition-all" placeholder="0"/>
          </div>
        </div>
        <div class="bg-primary/5 p-5 rounded-2xl flex justify-between items-center">
            <span class="text-[10px] font-black uppercase tracking-widest text-primary">Total Amount</span>
            <span class="text-3xl font-black text-slate-900 font-sans" id="inv-total">₹0</span>
        </div>
        <button onclick="createInvoice()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold text-xs tracking-widest uppercase hover:bg-slate-800 transition-all active:scale-[0.98]">Generate Invoice</button>
        <p id="form-msg" class="text-xs font-bold hidden text-center"></p>
      </div>
    </div>

    <div class="col-span-12 lg:col-span-7">
      <h3 class="text-xs font-black tracking-widest text-slate-500 uppercase mb-6">Active Disbursement Ledger</h3>
      <div class="space-y-4" id="invoices-list">
        <p class="text-sm text-slate-400 italic font-ui">Loading invoices...</p>
      </div>
    </div>
  </div>
</main>

<script>
  let currentProjectId = localStorage.getItem('currentProjectId');
  let materials = [];

  async function init() {
    const res = await fetch('/api/projects/');
    const projects = await res.json();
    if (!projects.length) return;
    if (!currentProjectId || !projects.find(p=>p.id===currentProjectId))
      currentProjectId = projects[0].id;
    localStorage.setItem('currentProjectId', currentProjectId);
    const cur = projects.find(p=>p.id===currentProjectId)||projects[0];
    document.getElementById('header-project').textContent = cur.name;
    const sel = document.getElementById('project-selector');
    sel.innerHTML = projects.map(p=>`<option value="${p.id}"${p.id===currentProjectId?' selected':''}>${p.name}</option>`).join('');
    await Promise.all([loadMaterials(), loadInvoices()]);
  }

  async function loadMaterials() {
    const r = await fetch(`/api/materials/${currentProjectId}`);
    materials = await r.json();
    rebuildMaterialDropdown();
  }

  function rebuildMaterialDropdown() {
    const ms = document.getElementById('inv-material');
    const currentVal = ms.value;
    ms.innerHTML =
      '<option value="">-- Select Material --</option>' +
      materials.map(m =>
        `<option value="${m.id}" data-price="${m.unit_price}">${m.name} (${m.unit})</option>`
      ).join('') +
      '<option value="__add_new__" class="font-bold text-indigo-600">➕  Add New Material...</option>';
    // Restore selection if still valid
    if (currentVal && currentVal !== '__add_new__') ms.value = currentVal;
  }

  // Intercept "Add New Material" option selection
  function handleMaterialChange(sel) {
    if (sel.value === '__add_new__') {
      sel.value = ''; // reset selection
      openAddMaterialModal();
      return;
    }
    fillPrice();
  }

  function fillPrice() {
    const sel = document.getElementById('inv-material');
    const opt = sel.options[sel.selectedIndex];
    if (opt && opt.dataset.price) {
      document.getElementById('inv-price').value = opt.dataset.price;
      updateTotal();
    }
  }

  function updateTotal() {
    const qty = parseFloat(document.getElementById('inv-qty').value)||0;
    const price = parseFloat(document.getElementById('inv-price').value)||0;
    document.getElementById('inv-total').textContent = `₹${Number((qty*price).toFixed(0)).toLocaleString('en-IN')}`;
  }

  async function createInvoice() {
    const matId = document.getElementById('inv-material').value;
    const desc = document.getElementById('inv-desc').value.trim();
    const qty = parseFloat(document.getElementById('inv-qty').value)||0;
    const price = parseFloat(document.getElementById('inv-price').value)||0;
    if (!matId || !qty || !price) { showMsg('Please fill all fields.', 'error'); return; }
    const body = {project_id: currentProjectId, items:[{material_id:matId, description:desc||'Material supply', quantity:qty, unit_price:price}]};
    const r = await fetch('/api/invoices/', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if (r.ok) {
      showMsg('Invoice created!', 'success');
      document.getElementById('inv-material').value='';
      document.getElementById('inv-desc').value='';
      document.getElementById('inv-qty').value='';
      document.getElementById('inv-price').value='';
      document.getElementById('inv-total').textContent='₹0';
      loadInvoices();
    } else {
      const err = await r.json();
      showMsg(err.error||'Failed to create invoice.', 'error');
    }
  }

  function showMsg(text, type) {
    const el = document.getElementById('form-msg');
    el.textContent = text;
    el.className = `text-xs font-bold text-center ${type==='error'?'text-rose-500':'text-emerald-600'}`;
    el.classList.remove('hidden');
    setTimeout(()=>el.classList.add('hidden'), 3000);
  }

  // ──────────────────────────────────────────────
  //  ADD MATERIAL MODAL
  // ──────────────────────────────────────────────
  function openAddMaterialModal() {
    const modal = document.getElementById('add-material-modal');
    modal.classList.remove('hidden');
    // Clear fields
    ['new-mat-name','new-mat-price','new-mat-category'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('new-mat-unit').value = 'bag';
    document.getElementById('modal-msg').classList.add('hidden');
    setTimeout(() => document.getElementById('new-mat-name').focus(), 50);
  }

  function closeAddMaterialModal() {
    document.getElementById('add-material-modal').classList.add('hidden');
  }

  // Close modal on backdrop click
  document.getElementById('add-material-modal').addEventListener('click', function(e) {
    if (e.target === this) closeAddMaterialModal();
  });

  async function saveNewMaterial() {
    const name     = document.getElementById('new-mat-name').value.trim();
    const unit     = document.getElementById('new-mat-unit').value;
    const price    = parseFloat(document.getElementById('new-mat-price').value) || 0;
    const category = document.getElementById('new-mat-category').value.trim();

    if (!name || !price) {
      showModalMsg('Material name and price are required.', 'error');
      return;
    }

    const body = { project_id: currentProjectId, name, unit, unit_price: price, category: category || undefined };

    try {
      const r = await fetch('/api/materials/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      if (r.ok) {
        const newMat = await r.json();
        // Reload materials and auto-select the new one
        await loadMaterials();
        const sel = document.getElementById('inv-material');
        sel.value = newMat.id;
        if (newMat.unit_price) {
          document.getElementById('inv-price').value = newMat.unit_price;
          updateTotal();
        }
        closeAddMaterialModal();
        showMsg(`"${name}" added & selected!`, 'success');
      } else {
        const err = await r.json();
        showModalMsg(err.error || 'Failed to add material.', 'error');
      }
    } catch (e) {
      showModalMsg('Network error. Please try again.', 'error');
    }
  }

  function showModalMsg(text, type) {
    const el = document.getElementById('modal-msg');
    el.textContent = text;
    el.className = `text-xs font-bold text-center ${type==='error'?'text-rose-500':'text-emerald-600'}`;
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 3000);
  }

  // Allow Enter key to submit modal form
  document.getElementById('add-material-modal').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') saveNewMaterial();
    if (e.key === 'Escape') closeAddMaterialModal();
  });
  // ──────────────────────────────────────────────

  async function loadInvoices() {
    const r = await fetch(`/api/invoices/${currentProjectId}`);
    const invs = await r.json();
    const el = document.getElementById('invoices-list');
    if (!invs.length) { el.innerHTML='<p class="text-sm text-slate-400 italic glass-card p-10 text-center">No invoices yet. Create your first one.</p>'; return; }
    
    const statusColor = s => ({
        draft: 'bg-slate-200 text-slate-600',
        sent: 'bg-indigo-100 text-indigo-700',
        paid: 'bg-emerald-100 text-emerald-700'
    }[s] || 'bg-slate-100');

    el.innerHTML = invs.map(inv=>`
      <div class="glass-card p-6 shadow-sm hover:scale-[1.01] transition-transform">
        <div class="flex justify-between items-start mb-6">
          <div>
            <p class="font-sans text-sm font-bold text-slate-900">${inv.invoice_number}</p>
            <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mt-1">${new Date(inv.created_at).toLocaleDateString('en-IN')}</p>
          </div>
          <div class="flex items-center gap-4">
            <span class="px-3 py-1 ${statusColor(inv.status)} text-[9px] font-black uppercase rounded-md shadow-sm border border-black/5">${inv.status}</span>
            <span class="text-2xl font-black text-slate-900 font-sans tracking-tight">₹${Number(inv.total_amount).toLocaleString('en-IN')}</span>
          </div>
        </div>
        <div class="flex gap-2">
          ${inv.status!=='paid'?`<button onclick="updateStatus('${inv.id}','paid')" class="px-4 py-2 bg-emerald-600 text-white text-[10px] font-bold uppercase tracking-widest rounded-lg hover:bg-emerald-700 transition-colors shadow-sm shadow-emerald-200">Mark Paid</button>`:''}
          ${inv.status==='draft'?`<button onclick="updateStatus('${inv.id}','sent')" class="px-4 py-2 bg-indigo-600 text-white text-[10px] font-bold uppercase tracking-widest rounded-lg hover:bg-indigo-700 transition-colors shadow-sm shadow-indigo-200">Mark Sent</button>`:''}
          <button onclick="deleteInvoice('${inv.id}')" class="px-4 py-2 border border-rose-200 text-rose-500 text-[10px] font-bold uppercase tracking-widest rounded-lg hover:bg-rose-50 transition-colors">Delete</button>
        </div>
      </div>`).join('');
  }

  async function updateStatus(id, status) {
    await fetch(`/api/invoices/${id}/status`, {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});
    loadInvoices();
  }

  async function deleteInvoice(id) {
    if (!confirm('Permanent removal of this invoice?')) return;
    await fetch(`/api/invoices/${id}`, {method:'DELETE'});
    loadInvoices();
  }

  function switchProject(id) { localStorage.setItem('currentProjectId', id); location.reload(); }
  init().catch(console.error);
</script>
</body>
</html>
