<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title> Samarth Developers | Inventory Management</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#6366f1",
          "background-cream": "#FFF8F0",
          "outline-muted": "#dcdad5",
        },
        fontFamily: {
          sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          ui: ['"Outfit"', 'sans-serif'],
        }
      }
    }
  }
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; line-height: 1; }
    
    body { 
        font-family: 'Outfit', sans-serif;
        background-image: url('https://images.unsplash.com/photo-1541888946425-d81bb19480c5?auto=format&fit=crop&q=80&w=2070'); 
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
    }

    .bg-overlay {
        background: rgba(255, 248, 240, 0.88);
        position: fixed;
        inset: 0;
        z-index: -10;
        backdrop-blur: 2px;
    }

    .glass-card {
        background: rgba(255, 255, 255, 0.7) !important;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 1.25rem;
    }

    .nav-glass {
        background: rgba(255, 255, 255, 0.6) !important;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
    }
</style>
</head>
<body class="antialiased min-h-screen relative">

<div class="bg-overlay"></div>

<header class="fixed top-0 w-full z-50 nav-glass border-b border-outline-muted/50">
  <div class="max-w-7xl mx-auto px-8 h-16 flex items-center justify-between">
    <div class="flex items-center gap-10">
      <span class="text-xl font-extrabold tracking-tight text-slate-800 font-sans uppercase">Construct<span class="text-primary">OS</span></span>
      <nav class="hidden md:flex items-center gap-2">
        <a href="/dashboard" class="flex items-center gap-2 px-4 py-2 text-slate-600 hover:text-primary font-semibold text-sm transition-all"> Dashboard </a>
        <a href="/inventory" class="flex items-center gap-2 px-4 py-2 bg-white/60 text-primary rounded-xl font-bold text-sm shadow-sm border border-white/40"> Inventory </a>
        <a href="/finance" class="flex items-center gap-2 px-4 py-2 text-slate-600 hover:text-primary font-semibold text-sm transition-all"> Finance </a>
        <a href="/invoices" class="flex items-center gap-2 px-4 py-2 text-slate-600 hover:text-primary font-semibold text-sm transition-all"> Invoices </a>
      </nav>
    </div>

    <div class="flex items-center gap-4">
      <div class="relative flex items-center bg-white/40 px-3 py-1.5 rounded-xl border border-white/40 focus-within:bg-white/80 transition-all">
        <span class="material-symbols-outlined text-slate-400 text-sm mr-2">search</span>
        <input id="search-input" class="bg-transparent border-none focus:ring-0 text-xs w-48" placeholder="Filter resources..." type="text" oninput="filterTable()"/>
      </div>
      <select id="project-selector" onchange="switchProject(this.value)" class="text-xs bg-transparent border-none font-bold text-slate-700 focus:ring-0 cursor-pointer"></select>
      <button onclick="location.reload()" class="p-2 rounded-full hover:bg-white/40 text-slate-500"><span class="material-symbols-outlined">refresh</span></button>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto pt-28 px-8 pb-20">
  <div class="flex justify-between items-end mb-10">
    <div>
      <h1 class="text-4xl font-extrabold tracking-tighter text-slate-900 font-sans mb-2">Inventory Matrix</h1>
      <p class="text-xs font-bold text-slate-500 uppercase tracking-widest font-sans" id="header-project-label">Loading Project...</p>
    </div>
    <button onclick="showAddModal()" class="bg-slate-900 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg hover:bg-slate-800 transition-all active:scale-95">
      + New Resource
    </button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
    <div class="glass-card p-6 shadow-sm relative overflow-hidden group">
      <p class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-1">Critical Alerts</p>
      <h3 class="text-4xl font-bold text-error font-sans" id="stat-low">0 Items</h3>
      <span class="material-symbols-outlined absolute -right-4 -bottom-4 text-7xl text-error/5 rotate-12">warning</span>
    </div>
    <div class="glass-card p-6 shadow-sm relative overflow-hidden group">
      <p class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-1">Total SKUs</p>
      <h3 class="text-4xl font-bold text-slate-900 font-sans" id="stat-total">0 Types</h3>
      <span class="material-symbols-outlined absolute -right-4 -bottom-4 text-7xl text-primary/5">inventory_2</span>
    </div>
    <div class="glass-card p-6 shadow-sm relative overflow-hidden group">
      <p class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-1">Asset Valuation</p>
      <h3 class="text-4xl font-bold text-slate-900 font-sans" id="stat-value">₹0</h3>
      <span class="material-symbols-outlined absolute -right-4 -bottom-4 text-7xl text-slate-900/5">payments</span>
    </div>
  </div>

  <div class="glass-card shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead>
          <tr class="bg-white/40 border-b border-white/20">
            <th class="px-8 py-4 text-[10px] font-black uppercase tracking-widest text-slate-500 font-sans">Resource Detail</th>
            <th class="px-8 py-4 text-[10px] font-black uppercase tracking-widest text-slate-500 font-sans">Unit</th>
            <th class="px-8 py-4 text-[10px] font-black uppercase tracking-widest text-slate-500 font-sans text-right">Stock Level</th>
            <th class="px-8 py-4 text-[10px] font-black uppercase tracking-widest text-slate-500 font-sans text-right">Unit Value</th>
            <th class="px-8 py-4 text-[10px] font-black uppercase tracking-widest text-slate-500 font-sans">Status</th>
            <th class="px-8 py-4"></th>
          </tr>
        </thead>
        <tbody id="materials-table" class="divide-y divide-white/20">
          <tr><td colspan="6" class="px-8 py-16 text-center text-sm text-slate-400 italic">Accessing resource server...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="p-4 bg-white/20 border-t border-white/10 flex justify-between items-center px-8">
      <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400" id="table-count">...</span>
    </div>
  </div>
</main>

<div id="add-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
  <div class="bg-white p-8 w-full max-w-lg rounded-2xl shadow-2xl border border-white/20">
    <div class="flex justify-between items-start mb-8">
        <h2 class="text-2xl font-extrabold tracking-tighter text-slate-900 font-sans uppercase">Provision Resource</h2>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div class="space-y-6">
      <div class="space-y-1">
        <label class="text-[10px] font-black tracking-widest uppercase text-slate-500">Nomenclature</label>
        <input id="m-name" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="e.g. Portland Cement"/>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1">
          <label class="text-[10px] font-black tracking-widest uppercase text-slate-500">Unit</label>
          <input id="m-unit" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-primary/20 outline-none" placeholder="Bags, Tons"/>
        </div>
        <div class="space-y-1">
          <label class="text-[10px] font-black tracking-widest uppercase text-slate-500">Initial Qty</label>
          <input id="m-qty" type="number" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-primary/20 outline-none" placeholder="0"/>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1">
          <label class="text-[10px] font-black tracking-widest uppercase text-slate-500">Unit Price (₹)</label>
          <input id="m-price" type="number" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-primary/20 outline-none" placeholder="0"/>
        </div>
        <div class="space-y-1">
          <label class="text-[10px] font-black tracking-widest uppercase text-slate-500">Alert Point</label>
          <input id="m-reorder" type="number" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-primary/20 outline-none" placeholder="10"/>
        </div>
      </div>
    </div>
    <div class="flex gap-4 mt-10">
      <button onclick="addMaterial()" class="flex-1 bg-slate-900 text-white py-4 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-800 transition-all">Record Entry</button>
      <button onclick="closeModal()" class="px-8 border border-slate-200 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-50 transition-all">Dismiss</button>
    </div>
    <p id="modal-error" class="text-error text-[10px] font-bold mt-4 hidden text-center"></p>
  </div>
</div>

<script>
  let currentProjectId = localStorage.getItem('currentProjectId');
  let allMaterials = [];

  async function init() {
    const res = await fetch('/api/projects/');
    const projects = await res.json();
    if (!projects.length) return;
    if (!currentProjectId || !projects.find(p=>p.id===currentProjectId))
      currentProjectId = projects[0].id;
    localStorage.setItem('currentProjectId', currentProjectId);
    
    const cur = projects.find(p=>p.id===currentProjectId) || projects[0];
    document.getElementById('header-project-label').textContent = cur.name;
    
    const sel = document.getElementById('project-selector');
    sel.innerHTML = projects.map(p=>`<option value="${p.id}"${p.id===currentProjectId?' selected':''}>${p.name}</option>`).join('');
    
    loadMaterials();
  }

  async function loadMaterials() {
    const r = await fetch(`/api/materials/${currentProjectId}`);
    allMaterials = await r.json();

    const lowStockR = await fetch(`/api/materials/low-stock/${currentProjectId}`);
    const lowStock = await lowStockR.json();
    const lowIds = new Set(lowStock.map(m=>m.id));

    document.getElementById('stat-total').textContent = `${allMaterials.length} Types`;
    document.getElementById('stat-low').textContent = `${lowStock.length} Items`;
    const totalValue = allMaterials.reduce((s,m)=>s+(m.quantity*m.unit_price),0);
    document.getElementById('stat-value').textContent = `₹${Number(totalValue.toFixed(0)).toLocaleString('en-IN')}`;
    document.getElementById('table-count').textContent = `${allMaterials.length} Resources Active`;
    
    renderTable(allMaterials, lowIds);
  }

  function renderTable(mats, lowIds) {
    const tb = document.getElementById('materials-table');
    if (!mats.length) { 
        tb.innerHTML='<tr><td colspan="6" class="px-8 py-12 text-center text-sm text-slate-400">No matching materials found.</td></tr>'; 
        return; 
    }
    
    tb.innerHTML = mats.map(m => {
      const isLow = lowIds ? lowIds.has(m.id) : (m.quantity <= m.reorder_threshold);
      return `
        <tr class="hover:bg-white/40 transition-colors">
          <td class="px-8 py-5">
            <div class="flex flex-col">
              <span class="text-sm font-bold text-slate-900 font-sans">${m.name}</span>
              <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">ID: ${m.id.slice(0,8)}</span>
            </div>
          </td>
          <td class="px-8 py-5 text-xs font-semibold text-slate-500 uppercase font-ui">${m.unit}</td>
          <td class="px-8 py-5 text-right">
            <div class="flex flex-col items-end">
              <span class="text-sm font-extrabold font-sans ${isLow ? 'text-error' : 'text-slate-900'}">${m.quantity}</span>
              <div class="w-16 h-1 bg-slate-200/50 rounded-full mt-1 overflow-hidden">
                <div class="h-full ${isLow ? 'bg-error' : 'bg-primary'}" style="width:${Math.min(100, (m.quantity/Math.max(m.reorder_threshold*2,1))*100)}%"></div>
              </div>
            </div>
          </td>
          <td class="px-8 py-5 text-right font-bold text-xs text-slate-600 font-sans">₹${Number(m.unit_price).toLocaleString('en-IN')}</td>
          <td class="px-8 py-5">
            <span class="inline-block px-3 py-1 ${isLow ? 'bg-rose-100 text-rose-700' : 'bg-emerald-100 text-emerald-700'} text-[9px] font-black uppercase rounded shadow-sm">
              ${isLow ? 'Critical' : 'Stable'}
            </span>
          </td>
          <td class="px-8 py-5 text-right">
            <button onclick="deleteMaterial('${m.id}')" class="text-slate-300 hover:text-error transition-colors">
              <span class="material-symbols-outlined text-lg">delete</span>
            </button>
          </td>
        </tr>`;
    }).join('');
  }

  function filterTable() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = allMaterials.filter(m => m.name.toLowerCase().includes(q));
    renderTable(filtered, null);
  }

  function showAddModal() { document.getElementById('add-modal').classList.remove('hidden'); }
  function closeModal() { document.getElementById('add-modal').classList.add('hidden'); }

  async function addMaterial() {
    const name = document.getElementById('m-name').value.trim();
    const unit = document.getElementById('m-unit').value.trim();
    const quantity = parseFloat(document.getElementById('m-qty').value)||0;
    const unit_price = parseFloat(document.getElementById('m-price').value)||0;
    const reorder_threshold = parseInt(document.getElementById('m-reorder').value)||10;
    if (!name || !unit) { showErr('Nomenclature and unit required'); return; }
    await fetch('/api/materials/', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({project_id: currentProjectId, name, unit, quantity, unit_price, reorder_threshold})
    });
    closeModal();
    loadMaterials();
  }

  async function deleteMaterial(id) {
    if (!confirm('Permanent removal of this resource?')) return;
    await fetch(`/api/materials/${id}`, {method:'DELETE'});
    loadMaterials();
  }

  function showErr(msg) {
    const el = document.getElementById('modal-error');
    el.textContent = msg; el.classList.remove('hidden');
  }

  function switchProject(id) { localStorage.setItem('currentProjectId', id); location.reload(); }
  init().catch(console.error);
</script>
</body>
</html>
